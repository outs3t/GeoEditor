<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GeoEditor V33 – All-In-One</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    /* Configurazione Font di Sistema per Apple (SF Pro) */
    :root {
        --font-apple-text: -apple-system, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
        --font-apple-display: -apple-system, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
        --font-roboto: 'Roboto', sans-serif;
    }

    /* --- STILI INTERFACCIA --- */
    :root { --bg: #0f172a; --panel: #1e293b; --panel-light: #334155; --acc: #3b82f6; --txt: #f8fafc; --danger: #ef4444; --success: #10b981; --warn: #eab308; --purple: #a855f7; --gold: #f59e0b; }
    body { background: var(--bg); color: var(--txt); font-family: var(--font-apple-text); display: flex; flex-direction: row; margin: 0; height: 100vh; overflow: hidden; overscroll-behavior: none; }
    
    .sidebar { width: 440px; background: var(--panel); padding: 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; border-right: 1px solid var(--panel-light); box-shadow: 4px 0 15px rgba(0,0,0,0.5); z-index: 10; height: 100vh; box-sizing: border-box; }
    .main { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #000; position: relative; height: 100vh; box-sizing: border-box; overflow: hidden; }
    
    #canvasContainer { width: 100%; height: 100%; overflow: auto; border: 2px solid var(--panel-light); box-shadow: 0 0 30px rgba(0,0,0,0.5); background: #1e293b; text-align: center; position: relative; border-radius: 12px; touch-action: none; }
    canvas { display: inline-block; vertical-align: top; box-shadow: 0 0 20px rgba(0,0,0,0.8); cursor: crosshair; transform-origin: top left; }
    #eraserCursor { position: absolute; border: 2px solid white; box-shadow: 0 0 5px black, inset 0 0 5px black; border-radius: 50%; pointer-events: none; display: none; transform: translate(-50%, -50%); z-index: 9999;}
    
    h2, h3 { margin: 0; color: var(--acc); }
    h2 { font-size: 1.5rem; text-align: center; margin-bottom: 5px; font-weight: 700; }
    h3 { font-size: 1.1rem; color: #94a3b8; border-bottom: 1px solid var(--panel-light); padding-bottom: 8px; margin-bottom: 12px; font-weight: 600;}
    
    .panel-section { background: rgba(0,0,0,0.25); padding: 15px; border-radius: 12px; border: 1px solid var(--panel-light); transition: 0.3s ease; margin-bottom: 8px; cursor: pointer; }
    .panel-section.active { border-color: var(--acc); background: rgba(59, 130, 246, 0.08); box-shadow: inset 0 0 0 1px var(--acc); cursor: default; }
    
    label { font-size: 0.85rem; font-weight: 600; color: #cbd5e1; display: flex; flex-direction: column; gap: 6px; }
    input[type="number"], input[type="text"], textarea, select { padding: 12px; border-radius: 8px; border: 1px solid var(--panel-light); background: #0f172a; color: white; width: 100%; box-sizing: border-box; font-family: inherit; font-size: 16px; }
    
    .btn { background: var(--panel-light); color: white; border: none; padding: 12px 16px; border-radius: 8px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s ease; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 48px; }
    .btn-primary { background: linear-gradient(135deg, var(--acc), #2563eb); }
    .btn-warn { background: linear-gradient(135deg, var(--warn), #ca8a04); color: #000; } 
    
    .toolbar { display: flex; gap: 8px; margin-bottom: 15px; }
    .tool-btn { flex: 1; padding: 10px 5px; font-size: 0.8rem; border: 2px solid transparent; flex-direction: column; gap: 4px; text-align: center; line-height: 1.2; }
    .tool-btn.active-patch { border-color: var(--acc); background: rgba(59, 130, 246, 0.2); }

    .fx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; }
    .layer-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; max-height: 160px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; }
    .layer-item { display: flex; justify-content: space-between; align-items: center; background: #0f172a; border: 1px solid #334155; padding: 10px 12px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; }
    .layer-item.active { border-color: var(--acc); background: rgba(59, 130, 246, 0.15); }

    #miniMap { height: 200px; width: 100%; margin-top: 12px; border-radius: 8px; display: none; border: 2px solid var(--panel-light); }

    @media (max-width: 800px) {
        body { flex-direction: column; }
        .main { order: 1; height: 45vh; }
        .sidebar { order: 2; width: 100%; height: 55vh; border-right: none; border-top: 3px solid var(--panel-light); border-radius: 20px 20px 0 0; }
    }
</style>
</head>
<body>

<div class="sidebar">
    <h2>🛠️ GeoEditor V33 <span style="font-size:0.8rem; font-weight:normal; color:var(--acc);">Font Pack</span></h2>
    
    <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
        <label class="btn btn-primary" style="flex: 2; margin: 0; font-size: 1rem;">📂 Carica Foto<input type="file" id="upload" accept="image/*" style="display: none;"></label>
        <div style="flex: 1.5; background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 8px; text-align: center; border: 1px solid var(--panel-light);">
            <label style="font-size: 0.75rem; color: #cbd5e1;">ZOOM: <span id="valZoom">100%</span></label>
            <input type="range" id="zoomSlider" min="10" max="400" value="100" style="width: 100%;">
        </div>
    </div>

    <div class="toolbar">
        <button class="btn tool-btn active-patch" id="toolPatch" onclick="setTool('patch')">🩹 Toppa</button>
        <button class="btn tool-btn" id="toolEraser" onclick="setTool('eraser')" style="background:var(--purple)">✨ Gomma</button>
        <button class="btn tool-btn" id="toolChameleon" onclick="setTool('chameleon')" style="background:var(--gold)">🦎 Auto</button>
    </div>

    <div class="panel-section active" id="panelPatchUI" onclick="setMode('patch')">
        <h3>Gestione Toppe</h3>
        <div class="layer-list" id="patchLayerList"></div>
        <div id="cloneConfirmBox" style="display:none; margin-top:10px;">
             <div class="fx-grid">
                 <label class="span-2">Sfumatura <span id="valFeather" style="float:right;">15px</span><input type="range" id="fxFeather" min="0" max="50" value="15"></label>
                 <label>Luminosità:<input type="range" id="fxBr" min="50" max="150" value="100"></label>
                 <label>Contrasto:<input type="range" id="fxCt" min="50" max="150" value="100"></label>
             </div>
             <button class="btn btn-primary" id="btnApplyClone">✅ Conferma Toppa</button>
        </div>
    </div>

    <div class="panel-section" id="panelText" onclick="setMode('text')">
        <h3>Inserimento Testo</h3>
        <div style="display:flex; gap:10px; margin-bottom: 10px;">
             <button class="btn btn-warn" id="btnDrawOCR" style="flex:1;">📐 Area OCR</button>
             <button class="btn btn-primary" id="btnAddTextLayer" style="flex:1;">➕ Testo</button>
        </div>
        <div class="layer-list" id="textLayerList"></div>
        
        <div id="textControls" style="display:none; margin-top:10px;">
             <textarea id="overlayText" placeholder="Testo..."></textarea>
             <div class="fx-grid">
                 <label style="grid-column: span 2;">Carattere (Font):
                     <select id="fontStyle">
                         <optgroup label="Android (Roboto)">
                             <option value="300|'Roboto'">Roboto Light</option>
                             <option value="400|'Roboto'" selected>Roboto Regular</option>
                             <option value="500|'Roboto'">Roboto Medium</option>
                             <option value="700|'Roboto'">Roboto Bold</option>
                         </optgroup>
                         <optgroup label="Apple (SF Pro)">
                             <option value="300|var(--font-apple-text)">SF Pro Text Light</option>
                             <option value="400|var(--font-apple-text)">SF Pro Text Regular</option>
                             <option value="500|var(--font-apple-text)">SF Pro Text Medium</option>
                             <option value="600|var(--font-apple-text)">SF Pro Text Semibold</option>
                             <option value="600|var(--font-apple-display)">SF Pro Display Semibold</option>
                         </optgroup>
                     </select>
                 </label>
                 <label>Size: <input type="number" id="fontSize" value="45"></label>
                 <label>Bordo: <input type="number" id="textStroke" value="2"></label>
             </div>
        </div>
    </div>

    <div class="panel-section">
        <h3>GPS & Salvataggio</h3>
        <input type="text" id="addressInput" placeholder="Cerca indirizzo..." style="margin-bottom:8px;">
        <button class="btn btn-warn" id="btnGeocode">📍 Trova e Centra</button>
        <div style="display:flex; gap:5px; margin-top:8px;">
            <input type="number" id="exifLat" placeholder="Lat" step="0.000001">
            <input type="number" id="exifLon" placeholder="Lon" step="0.000001">
        </div>
        <div id="miniMap"></div>
        <button class="btn btn-primary" id="btnDownload" style="margin-top:15px;">💾 SALVA IMMAGINE</button>
    </div>
</div>

<div class="main">
    <div id="canvasContainer">
        <canvas id="editorCanvas"></canvas>
    </div>
</div>

<script>
    // Configurazione Base e Canvas
    const canvas = document.getElementById('editorCanvas');
    const ctx = canvas.getContext('2d');
    let baseImage = null;
    let patchLayers = [];
    let textLayers = [];
    let currentTool = 'patch';
    let currentMode = 'patch';
    let editingPatchIndex = -1;
    let selectedTextIndex = -1;
    let isMouseDown = false;
    let startX, startY;

    // Caricamento Immagine
    document.getElementById('upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            baseImage = new Image();
            baseImage.onload = () => {
                canvas.width = baseImage.width;
                canvas.height = baseImage.height;
                fitCanvas();
                redraw();
            };
            baseImage.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    function fitCanvas() {
        const zoom = document.getElementById('zoomSlider').value / 100;
        canvas.style.width = (canvas.width * zoom) + 'px';
        canvas.style.height = (canvas.height * zoom) + 'px';
    }

    document.getElementById('zoomSlider').addEventListener('input', fitCanvas);

    // Gestione Testo
    document.getElementById('btnAddTextLayer').addEventListener('click', () => {
        textLayers.push({
            content: "NUOVO TESTO",
            x: canvas.width / 4,
            y: canvas.height / 4,
            size: 45,
            font: "400|'Roboto'",
            stroke: 2,
            visible: true
        });
        selectedTextIndex = textLayers.length - 1;
        setMode('text');
        updateUI();
        redraw();
    });

    function redraw() {
        if (!baseImage) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(baseImage, 0, 0);

        // Disegna Toppe
        patchLayers.forEach((l, i) => {
            ctx.save();
            if (l.filters.feather > 0) {
                ctx.filter = `blur(${l.filters.feather / 2}px) brightness(${l.filters.br}%) contrast(${l.filters.ct}%)`;
            }
            ctx.drawImage(canvas, l.source.x, l.source.y, l.target.w, l.target.h, l.target.x, l.target.y, l.target.w, l.target.h);
            ctx.restore();
            if (editingPatchIndex === i) {
                ctx.strokeStyle = "red"; ctx.lineWidth = 4;
                ctx.strokeRect(l.target.x, l.target.y, l.target.w, l.target.h);
            }
        });

        // Disegna Testi con Font Dinamici
        textLayers.forEach((l, i) => {
            if (!l.visible) return;
            const parts = l.font.split('|');
            ctx.font = `${parts[0]} ${l.size}px ${parts[1]}`;
            ctx.fillStyle = "white";
            ctx.strokeStyle = "black";
            ctx.lineWidth = l.stroke;
            ctx.lineJoin = "round";
            
            if (l.stroke > 0) ctx.strokeText(l.content, l.x, l.y);
            ctx.fillText(l.content, l.x, l.y);
            
            if (selectedTextIndex === i && currentMode === 'text') {
                ctx.strokeStyle = "#3b82f6"; ctx.setLineDash([5, 5]);
                ctx.strokeRect(l.x - 5, l.y - l.size, ctx.measureText(l.content).width + 10, l.size + 10);
                ctx.setLineDash([]);
            }
        });
    }

    // Eventi Mouse / Touch
    canvas.addEventListener('mousedown', e => {
        const rect = canvas.getBoundingClientRect();
        const scale = canvas.width / rect.width;
        startX = (e.clientX - rect.left) * scale;
        startY = (e.clientY - rect.top) * scale;
        isMouseDown = true;
    });

    canvas.addEventListener('mousemove', e => {
        if (!isMouseDown) return;
        const rect = canvas.getBoundingClientRect();
        const scale = canvas.width / rect.width;
        const currX = (e.clientX - rect.left) * scale;
        const currY = (e.clientY - rect.top) * scale;

        if (currentMode === 'text' && selectedTextIndex > -1) {
            textLayers[selectedTextIndex].x = currX;
            textLayers[selectedTextIndex].y = currY;
            redraw();
        }
    });

    canvas.addEventListener('mouseup', () => { isMouseDown = false; });

    // Funzioni Utility
    function setMode(m) {
        currentMode = m;
        document.getElementById('panelPatchUI').classList.toggle('active', m === 'patch');
        document.getElementById('panelText').classList.toggle('active', m === 'text');
        updateUI();
    }

    function setTool(t) { currentTool = t; redraw(); }

    function updateUI() {
        if (currentMode === 'text' && selectedTextIndex > -1) {
            const l = textLayers[selectedTextIndex];
            document.getElementById('textControls').style.display = 'block';
            document.getElementById('overlayText').value = l.content;
            document.getElementById('fontStyle').value = l.font;
            document.getElementById('fontSize').value = l.size;
        }
        
        const textList = document.getElementById('textLayerList');
        textList.innerHTML = textLayers.map((l, i) => `
            <div class="layer-item ${selectedTextIndex === i ? 'active' : ''}" onclick="selectedTextIndex=${i}; updateUI(); redraw();">
                <span>T: ${l.content.substring(0, 10)}</span>
                <button onclick="textLayers.splice(${i},1); redraw(); updateUI();">🗑️</button>
            </div>
        `).join('');
    }

    // Listener controlli testo
    document.getElementById('overlayText').addEventListener('input', e => { if(selectedTextIndex > -1) { textLayers[selectedTextIndex].content = e.target.value; redraw(); } });
    document.getElementById('fontStyle').addEventListener('change', e => { if(selectedTextIndex > -1) { textLayers[selectedTextIndex].font = e.target.value; redraw(); } });
    document.getElementById('fontSize').addEventListener('input', e => { if(selectedTextIndex > -1) { textLayers[selectedTextIndex].size = e.target.value; redraw(); } });

    // GPS e Mappa
    let map = null;
    document.getElementById('btnGeocode').addEventListener('click', async () => {
        const addr = document.getElementById('addressInput').value;
        const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${addr}`);
        const data = await resp.json();
        if (data.length > 0) {
            const lat = data[0].lat; const lon = data[0].lon;
            document.getElementById('exifLat').value = lat;
            document.getElementById('exifLon').value = lon;
            document.getElementById('miniMap').style.display = 'block';
            if (!map) map = L.map('miniMap').setView([lat, lon], 15);
            else map.setView([lat, lon], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker([lat, lon]).addTo(map);
        }
    });

    // Download
    document.getElementById('btnDownload').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'geo_falsificato.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.9);
        link.click();
    });

</script>
</body>
</html>
